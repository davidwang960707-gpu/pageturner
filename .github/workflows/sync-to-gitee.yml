name: Sync to Gitee

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  delete:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ github.event.repository.name == 'Atlas-One' && 'AtlasOne-Agents' || github.event.repository.name == 'opendocx' && 'opendocx' || 'page-turners-kill' }}
        run: |
          set -e
          if [ -z "$GITEE_TOKEN" ]; then
            echo "missing_secret"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add gitee "https://DavidWDK7:${GITEE_TOKEN}@gitee.com/DavidWDK7/${GITEE_REPO}.git"
          git push --mirror gitee
